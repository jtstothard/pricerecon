name: ao
source_type: retailer
base_url: https://www.ao.com
search_url: https://www.ao.com/uk/search?search={query}
use_flare_solverr: true
selectors:
  card: article, .product, .product-card, .search-result
  title: a[href] h3, a[href] .title, h3, .product-title
  price: .price, .product-price, [data-testid="price"], [data-price]
  url: a[href]
  stock: .stock, .availability, .product-stock
  image: img
  id: a[href]
category: gpu
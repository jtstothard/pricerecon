name: ccl
source_type: retailer
base_url: https://www.cclonline.com
search_url: https://www.cclonline.com/search/{query}
selectors:
  card: article, .product, .product-item, .search-result
  title: a[href] h3, a[href] .title, h3, .product-title
  price: .price, .product-price, [data-testid="price"]
  url: a[href]
  stock: .stock, .availability, .product-stock, [data-testid="stock"]
  image: img
  id: a[href]
category: gpu

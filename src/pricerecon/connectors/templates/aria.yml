name: aria
source_type: retailer
base_url: https://www.aria.co.uk
# Aria's former search endpoint is retired. The live site now serves a
# customer-closure message and has no product/search listings; retain the
# homepage as the only live URL rather than issuing requests to the old 404.
search_url: https://www.aria.co.uk/
selectors:
  card: article, .product, .product-item, .search-result
  title: a[href] h3, a[href] .title, h3, .product-title
  price: .price, .product-price, [data-testid="price"]
  url: a[href]
  stock: .stock, .availability, .product-stock, [data-testid="stock"]
  image: img
  id: a[href]
category: gpu

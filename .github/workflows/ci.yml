name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          # Note: playwright and curl_cffi are optional deps
          # Tests should not fail if they are missing

      - name: Run pytest
        run: |
          # Run tests - skip tests that require optional dependencies
          pytest -v --tb=short

      - name: Run linting
        run: |
          # Run black check
          black --check src/pricerecon tests/

          # Run ruff check
          ruff check src/pricerecon tests/

      - name: Type check
        run: |
          mypy src/pricerecon
        continue-on-error: true  # Don't block on mypy errors for now
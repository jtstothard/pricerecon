name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run canonical quality gate
        run: python -m pricerecon.quality_gate

  live-verification:
    runs-on: ubuntu-latest
    # Only run live tests if:
    # 1. Secrets are available (not on PRs from forks)
    # 2. PR is labeled with "run-live-tests"
    # 3. Explicitly enabled via environment variable
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-live-tests')) ||
      (github.event_name == 'pull_request' && (
        secrets.EBAY_APP_ID != '' ||
        secrets.FB_C_USER != '' ||
        secrets.ALIEXPRESS_DS_APP_KEY != ''
      ))

    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install Playwright browsers (for browser-based connectors)
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Run live verification gate
        env:
          # Provide connector secrets if available
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
          FB_C_USER: ${{ secrets.FB_C_USER }}
          FB_XS: ${{ secrets.FB_XS }}
          FB_DATR: ${{ secrets.FB_DATR }}
          FB_FR: ${{ secrets.FB_FR }}
          FB_SB: ${{ secrets.FB_SB }}
          ALIEXPRESS_DS_APP_KEY: ${{ secrets.ALIEXPRESS_DS_APP_KEY }}
          ALIEXPRESS_DS_APP_SECRET: ${{ secrets.ALIEXPRESS_DS_APP_SECRET }}
          ALIEXPRESS_DS_ACCESS_TOKEN: ${{ secrets.ALIEXPRESS_DS_ACCESS_TOKEN }}
          ALIEXPRESS_DS_REFRESH_TOKEN: ${{ secrets.ALIEXPRESS_DS_REFRESH_TOKEN }}
          # Tell the gate we're in CI and want live tests
          PRICERECON_RUN_LIVE_TESTS: "1"
        run: python -m pricerecon.live_verification_gate

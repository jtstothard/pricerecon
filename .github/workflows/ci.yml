name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run canonical quality gate
        run: python -m pricerecon.quality_gate

  live-verification:
    runs-on: ubuntu-latest
    # Only run live tests if PR is explicitly labeled with "run-live-tests"
    # This ensures standard CI remains deterministic and secret-free
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-live-tests')

    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install Playwright browsers (for browser-based connectors)
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Check for required credentials
        id: check-creds
        run: |
          # Check if at least one connector secret is available
          if [ -z "$EBAY_APP_ID" ] && [ -z "$FB_C_USER" ] && [ -z "$ALIEXPRESS_DS_APP_KEY" ]; then
            echo "status=skip" >> $GITHUB_OUTPUT
            echo "reason=No connector credentials available - live tests require at least one of: EBAY_APP_ID, FB_C_USER, ALIEXPRESS_DS_APP_KEY" >> $GITHUB_OUTPUT
          else
            echo "status=run" >> $GITHUB_OUTPUT
          fi
        env:
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
          FB_C_USER: ${{ secrets.FB_C_USER }}
          ALIEXPRESS_DS_APP_KEY: ${{ secrets.ALIEXPRESS_DS_APP_KEY }}

      - name: Skip live tests (no credentials)
        if: steps.check-creds.outputs.status == 'skip'
        run: |
          echo "::notice::${{ steps.check-creds.outputs.reason }}"
          echo "Skipping live verification: ${{ steps.check-creds.outputs.reason }}"

      - name: Run live connector tests
        if: steps.check-creds.outputs.status == 'run'
        env:
          # Provide connector secrets if available
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
          FB_C_USER: ${{ secrets.FB_C_USER }}
          FB_XS: ${{ secrets.FB_XS }}
          FB_DATR: ${{ secrets.FB_DATR }}
          FB_FR: ${{ secrets.FB_FR }}
          FB_SB: ${{ secrets.FB_SB }}
          ALIEXPRESS_DS_APP_KEY: ${{ secrets.ALIEXPRESS_DS_APP_KEY }}
          ALIEXPRESS_DS_APP_SECRET: ${{ secrets.ALIEXPRESS_DS_APP_SECRET }}
          ALIEXPRESS_DS_ACCESS_TOKEN: ${{ secrets.ALIEXPRESS_DS_ACCESS_TOKEN }}
          ALIEXPRESS_DS_REFRESH_TOKEN: ${{ secrets.ALIEXPRESS_DS_REFRESH_TOKEN }}
        run: |
          # Run pytest with live connector tests
          pytest tests/test_connectors.py -v -m "not mock" --timeout=60 || true
# PriceRecon configuration

database_path: pricerecon.db
host: 0.0.0.0
port: 8000
log_level: info

# FlareSolverr endpoint (optional, for Cloudflare-protected retailers)
# See docs/FLARESOLVERR_DEPLOYMENT.md for deployment instructions
# Default: http://localhost:8191 (standalone Docker) or http://flaresolverr:8191 (Docker Compose)
flaresolverr_url: "http://localhost:8191"

# Connector-specific settings (optional)
connectors:
  ebay:
    app_id: null  # Your eBay App ID
    # OAuth token will be stored in database
  amazon_uk:
    enabled: true
  cex:
    enabled: true
  fb_marketplace:
    enabled: false  # Requires Facebook cookies
  shopify:
    enabled: true
    # Optional single-store default only. In shared/multi-store deployments,
    # prefer per-watch sources[].config.base_url (or store_url) instead.
    # base_url: https://example.myshopify.com
  # Add more connector configs here